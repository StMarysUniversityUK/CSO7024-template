# nginx reverse-proxy configuration for lab 6.2.
# nginx listens on port 80 and forwards every request to the app service on the
# Compose network. The name "app" resolves to the application container because
# Compose provides DNS for service names.

upstream application {
    # "app" is the service name in docker-compose.yml; 8000 is the app's port.
    server app:8000;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://application;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
