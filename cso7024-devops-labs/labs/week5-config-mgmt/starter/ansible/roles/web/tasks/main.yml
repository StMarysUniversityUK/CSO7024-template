---
# roles/web/tasks/main.yml — install and configure nginx, then publish a page.
#
# This role is shared by the stretch goal of lab 5.2 and the main path of
# lab 5.3. It is intentionally small so you can read every task.

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure nginx is running and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Publish the index page from a template
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx
