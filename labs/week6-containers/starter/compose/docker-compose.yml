# docker-compose.yml for lab 6.2 — fill in the TODO markers.
#
# Three services:
#   app    the shared Python application, built from the repository-root app/
#   db     a Postgres database with a persistent named volume
#   proxy  an nginx reverse proxy in front of the app
#
# The services share a default network created by Compose and find each other by
# service name (app, db, proxy) rather than by IP address.
#
# Bring it up with:
#   docker compose up -d
#   docker compose ps      # all three should report healthy after a minute

services:
  app:
    # Build the shared application that you copied into ./app (see README).
    # Tagging it cso7024-app:0.2 reuses the image name from lab 6.1.
    build:
      context: ./app
      dockerfile: Dockerfile
    image: cso7024-app:0.2
    # TODO (Step 3): set environment keys.
    #   DATABASE_URL  reference the db service by name, e.g.
    #                 postgresql://appuser:${DB_PASSWORD}@db:5432/appdb
    #   PORT          8000
    #   LOG_LEVEL     info
    environment: {}
      # DATABASE_URL: "postgresql://appuser:${DB_PASSWORD}@db:5432/appdb"
      # PORT: "8000"
      # LOG_LEVEL: "info"
    # TODO (Step 3): only start once the database is healthy.
    # depends_on:
    #   db:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 3s
      retries: 3

  db:
    image: postgres:16-alpine
    # TODO (Step 4): set the standard Postgres variables. Read the password from
    # the project .env file via ${DB_PASSWORD}.
    #   POSTGRES_USER: appuser
    #   POSTGRES_PASSWORD: ${DB_PASSWORD}
    #   POSTGRES_DB: appdb
    environment: {}
    # The init script runs only the first time the volume is created.
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # TODO (Step 4): add a named volume so data survives 'docker compose down'.
      # - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 3s
      retries: 5

  proxy:
    image: nginx:1.27-alpine
    # TODO (Step 5): publish the proxy and route to the app.
    #   - mount ./proxy/nginx.conf at /etc/nginx/conf.d/default.conf (read-only)
    #   - publish port 80 on the host
    #   - depend on the app being healthy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # depends_on:
    #   app:
    #     condition: service_healthy

# TODO (Step 4): declare the named volume you referenced above.
volumes: {}
  # db-data:
